name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Notes ${{ github.ref_name }}
          body: |
            Latest Windows installer for Notes.

            This release is built automatically from `${{ github.sha }}`.
          files: |
            dist/Notes Setup *.exe
            dist/Notes Setup *.exe.blockmap
            dist/latest.yml
