name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

jobs:
  testflight:
    runs-on: macos-15
    env:
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID || 'com.notesapp.ios' }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
      GOOGLE_IOS_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_IOS_REVERSED_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Capacitor web app
        run: npm run mobile:build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Add Google iOS OAuth URL scheme
        if: env.GOOGLE_IOS_REVERSED_CLIENT_ID != ''
        run: |
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string Google OAuth" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $GOOGLE_IOS_REVERSED_CLIENT_ID" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:1 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:1:CFBundleURLName string Notes Deep Links" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:1:CFBundleURLSchemes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:1:CFBundleURLSchemes:0 string notesapp" ios/App/App/Info.plist

      - name: Upload to TestFlight
        run: bundle exec fastlane ios beta
